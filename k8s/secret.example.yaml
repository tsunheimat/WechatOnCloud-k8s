# 面板首个管理员账号 / 密码。
#
# 复制为 secret.yaml、改成你自己的强口令，并在部署前先创建：
#   kubectl apply -f k8s/secret.yaml
# 或者不用文件，直接命令创建：
#   kubectl -n wechat-on-cloud create secret generic woc-panel-admin \
#     --from-literal=username=admin --from-literal=password='你的强口令'
#
# 不创建本 Secret 时，deployment.yaml 里的 secretKeyRef 是 optional 的，面板会回退到默认
# admin / wechat 并在首次登录强制改密——务必尽快修改。本文件不在 kustomization 内，不会被
# `kubectl apply -k k8s` 自动应用，避免把口令提交进源码。
apiVersion: v1
kind: Secret
metadata:
  name: woc-panel-admin
  namespace: wechat-on-cloud
type: Opaque
stringData:
  username: admin
  password: "change-me-please"
---
# 单点登录 / SSO（OIDC，可选）。配齐 issuer + client_id + client_secret 即启用 SSO 登录；
# 不创建本 Secret 则 OIDC 关闭，登录页仅本地用户名密码。各键含义见根目录 .env.example。
#
# 在 IdP 里把应用的 Redirect URI 登记为： https://<面板域名>/api/auth/oidc/callback
# 并确保 <面板域名> 已在 deployment 的 PANEL_ALLOWED_HOSTS 内。
#
# 非密钥类调参（用户名 claim、自动建号、管理员分组等）在 deployment.yaml 里以 env 配置。
apiVersion: v1
kind: Secret
metadata:
  name: woc-oidc
  namespace: wechat-on-cloud
type: Opaque
stringData:
  issuer: "https://idp.example.com/application/o/woc/"
  client_id: "change-me"
  client_secret: "change-me"
  # 可选：跨面板滚动更新保持登录 cookie 签名的稳定密钥（建议设为一段随机长字符串）。
  # cookie_secret: "a-long-random-string"
